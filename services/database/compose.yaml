version: '17.4'
services:
  db:
    image: postgres
    container_name: db_finance_kafka
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: products, orders, clients
    ports:
      - "5555:5432"
    volumes:
      - ./data:/var/lib/postgresql